# cove is a credential firewall for contained agent sessions.
# Keep host secrets out of the box; allow/inject rules decide audited egress.

# Opaque package-manager, source, and OAuth-login hosts. Keep this baseline so
# fresh sessions can install tools and use existing host-side logins.
allow = [
  "chatgpt.com", "auth.openai.com",
  "accounts.google.com", "oauth2.googleapis.com", "cloudcode-pa.googleapis.com",
  "github.com", "api.github.com", "codeload.github.com", "*.githubusercontent.com",
  "dash.cloudflare.com",
  "sts.amazonaws.com", "s3.amazonaws.com", "*.s3.amazonaws.com",
  "registry.npmjs.org", "pypi.org", "files.pythonhosted.org",
  "proxy.golang.org", "sum.golang.org",
  "index.crates.io", "static.crates.io",
  "objects.githubusercontent.com",
  "cdn-lfs.huggingface.co", "cdn-lfs-us-1.huggingface.co", "cdn-lfs-eu-1.huggingface.co",
  "*.hf.co",
]

[options]
audit = true

# A host-logged-in Claude works without `cove add`: the OAuth token is read
# host-side for each request and is never placed in the contained session.
[[inject]]
name           = "claude-oauth"
host           = "api.anthropic.com"
header_name    = "Authorization"
header_template = "Bearer {secret}"
secret         = "json:~/.claude/.credentials.json#claudeAiOauth.accessToken"
mode           = "oauth-refresh"
dummy_env      = "ANTHROPIC_API_KEY"
dummy_value    = "cove-dummy-claude-ask-the-human-to-login-with-claude-on-the-host"
strip_headers  = ["x-api-key"]
base_url_env   = "ANTHROPIC_BASE_URL"
base_url_value = "https://api.anthropic.com"
alpn           = "h2"

# BEGIN COVE MANAGED — written by cove commands
[managed]
version = 1
# END COVE MANAGED
